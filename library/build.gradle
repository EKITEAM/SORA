plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.ekidevs.sora'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.5"

        buildConfigField "String", "SORA_VERSION", "\"${versionName}\""
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.annotation:annotation:1.7.0'
    implementation 'com.caverock:androidsvg-aar:1.4'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.EKITEAM'
                artifactId = 'sora'
                version = '1.0.5'
            }
        }
    }
}
